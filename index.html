<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Driver Room Center</title>
    <link rel="stylesheet" href="css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .app-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .app-logo i {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 12px;
            text-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .app-logo h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .app-logo p {
            font-family: 'Prompt', sans-serif;
            color: var(--text-muted);
            margin: 5px 0 0 0;
            font-size: 0.9rem;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Tabs */
        .tab-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-family: 'Prompt', sans-serif;
            font-weight: 500;
            color: var(--text-muted);
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .tab-btn.active {
            background: white;
            color: var(--primary);
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .tab-pane {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Form Inputs */
        .auth-input-group {
            margin-bottom: 16px;
        }

        .auth-input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #475569;
        }

        .auth-input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            background: #fff;
            font-family: 'Prompt', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: var(--primary);
            color: white;
            font-family: 'Prompt', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        /* Notice Text */
        .notice-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(5px);
        }

        #loadingOverlay.active {
            display: flex;
        }
    </style>
</head>

<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Loading Screen -->
    <div id="loadingOverlay">
        <i class="fa-solid fa-circle-notch fa-spin fa-3x" style="color: var(--primary); margin-bottom: 16px;"></i>
        <p style="font-family: 'Prompt', sans-serif; font-weight: 500; color: var(--text-main); font-size: 1.1rem;"
            id="loadingText">กำลังตรวจสอบข้อมูล...</p>
    </div>

    <div class="login-container">
        <div class="app-logo fade-in-up">
            <i class="fa-solid fa-car-side"></i>
            <h1>DRIVER ROOM</h1>
            <p>Center Application</p>
        </div>

        <div class="auth-card fade-in-up" style="animation-delay: 0.1s;">

            <!-- Tabs Navigation -->
            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('login')">เข้าสู่ระบบ</button>
                <button class="tab-btn" onclick="switchTab('register')">ลงทะเบียน</button>
            </div>

            <!-- Login Pane -->
            <div id="login-pane" class="tab-pane active">
                <div class="auth-input-group relative">
                    <label>รหัสพนักงาน (พนักงานที่เคยลงทะเบียนแล้ว)</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-hashtag input-icon"></i>
                        <input type="text" id="login_emp_id" class="auth-input" placeholder="กรอกรหัสพนักงาน"
                            autocomplete="off">
                    </div>
                </div>
                <button class="auth-btn ripple-btn" onclick="handleLogin()">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> เข้าสู่ระบบ
                </button>
            </div>

            <!-- Register Pane -->
            <div id="register-pane" class="tab-pane">
                <div
                    style="background: rgba(59, 130, 246, 0.1); color: #3b82f6; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.85rem; display: flex; gap: 10px; align-items: flex-start;">
                    <i class="fa-solid fa-circle-info" style="margin-top: 3px;"></i>
                    <span>สำหรับเข้าใช้งานครั้งแรก ระบบจะบันทึกข้อมูลของคุณไว้ในฐานข้อมูล</span>
                </div>

                <div class="auth-input-group">
                    <label>รหัสพนักงาน</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-hashtag input-icon"></i>
                        <input type="text" id="reg_emp_id" class="auth-input" placeholder="กรอกรหัสพนักงาน"
                            autocomplete="off">
                    </div>
                </div>

                <div style="display: flex; gap: 12px;">
                    <div class="auth-input-group" style="flex: 1;">
                        <label>ชื่อจริง</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-regular fa-user input-icon"></i>
                            <input type="text" id="reg_firstname" class="auth-input" placeholder="ชื่อจริง">
                        </div>
                    </div>

                    <div class="auth-input-group" style="flex: 1;">
                        <label>นามสกุล</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-regular fa-id-badge input-icon"></i>
                            <input type="text" id="reg_lastname" class="auth-input" placeholder="นามสกุล">
                        </div>
                    </div>
                </div>

                <button class="auth-btn ripple-btn" onclick="handleRegister()"
                    style="background: #10b981; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);">
                    <i class="fa-solid fa-user-check"></i> ลงทะเบียนและเข้าสู่ระบบ
                </button>
            </div>

        </div>

        <p class="notice-text fade-in-up" style="animation-delay: 0.2s;">
            ระบบจะบันทึกการเข้าสู่ระบบของคุณไว้ในอุปกรณ์นี้<br>คุณไม่ต้องเข้าสู่ระบบใหม่จนกว่าจะกด "ออกจากระบบ"
        </p>
    </div>

    <!-- Firebase SDK & Config -->
    <script type="module" src="js/firebase-config.js"></script>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Check if user is already logged in
        window.onload = () => {
            const savedUser = localStorage.getItem('driver_app_user');
            if (savedUser) {
                // Already logged in, redirect to home
                window.location.replace('home.html');
            }
        };

        // Tab Switching Logic
        window.switchTab = function (tabName) {
            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update panes
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            document.getElementById(tabName + '-pane').classList.add('active');
        };

        // UI Loading State
        function setLoading(active, text = 'กำลังตรวจสอบข้อมูล...') {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').textContent = text;
            if (active) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }

        // Login Handler
        window.handleLogin = async function () {
            const empId = document.getElementById('login_emp_id').value.trim();
            if (!empId) {
                alert('กรุณากรอกรหัสพนักงาน');
                return;
            }

            setLoading(true, 'กำลังเข้าสู่ระบบ...');

            try {
                // Check if user exists in Firestore
                const q = query(collection(db, "employees"), where("empId", "==", empId));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    setLoading(false);
                    alert('ไม่พบรหัสพนักงานนี้ในระบบ กรุณาไปที่แท็บ "ลงทะเบียน" เพื่อลงชื่อเข้าใช้งานครั้งแรก');
                    return;
                }

                // Get the first matched user's data
                let userData = null;
                querySnapshot.forEach((doc) => { userData = doc.data(); });

                // Save to localStorage
                localStorage.setItem('driver_app_user', JSON.stringify({
                    empId: userData.empId,
                    name: userData.name
                }));

                // Redirect to home
                window.location.replace('home.html');

            } catch (error) {
                console.error("Error logging in: ", error);
                setLoading(false);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้ง');
            }
        };

        // Register Handler
        window.handleRegister = async function () {
            const empId = document.getElementById('reg_emp_id').value.trim();
            const firstName = document.getElementById('reg_firstname').value.trim();
            const lastName = document.getElementById('reg_lastname').value.trim();

            if (!empId || !firstName || !lastName) {
                alert('กรุณากรอกข้อมูลให้ครบถ้วนทุกช่อง');
                return;
            }

            const fullName = `${firstName} ${lastName}`;
            setLoading(true, 'กำลังลงทะเบียนและบันทึกข้อมูล...');

            try {
                // Check if employee ID already exists to prevent duplicates
                const q = query(collection(db, "employees"), where("empId", "==", empId));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    // Emp ID already exists, ask if they want to log in instead
                    setLoading(false);
                    alert('รหัสพนักงานนี้ถูกลงทะเบียนไว้แล้ว กรุณาไปที่แท็บ "เข้าสู่ระบบ" เพื่อใช้งาน');
                    switchTab('login');
                    document.getElementById('login_emp_id').value = empId;
                    return;
                }

                // Add new employee to Firestore
                await addDoc(collection(db, "employees"), {
                    empId: empId,
                    name: fullName,
                    createdAt: serverTimestamp()
                });

                // Save session right after successful registration
                localStorage.setItem('driver_app_user', JSON.stringify({
                    empId: empId,
                    name: fullName
                }));

                // Success, redirect to home
                window.location.replace('home.html');

            } catch (error) {
                console.error("Error registering: ", error);
                setLoading(false);
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองใหม่อีกครั้ง');
            }
        };

        // Add enter key support
        document.getElementById('login_emp_id').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('reg_lastname').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleRegister();
        });
    </script>
</body>

</html>
