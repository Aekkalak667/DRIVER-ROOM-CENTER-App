<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Driver Room Center App</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="app-container"
        style="display: flex; flex-direction: column; justify-content: center; min-height: 100vh; padding: 24px;">

        <!-- Main Banner Ad/Gif -->
        <div class="main-banner-container fade-in-up"
            style="border-radius: var(--radius-xl); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-bottom: 24px;">
            <img src="images/banner.gif" alt="Center Banner"
                style="width: 100%; height: auto; display: block; object-fit: cover;">
        </div>

        <div class="login-card glass-panel fade-in-up"
            style="padding: 36px 24px; border-radius: var(--radius-xl); animation-delay: 0.1s; text-align: center;">
            <div class="icon-wrapper glass-icon"
                style="--card-color: var(--primary); width: 80px; height: 80px; margin: 0 auto 20px; font-size: 2.5rem; border-radius: 20px;">
                <i class="fa-solid fa-truck-fast"></i>
            </div>

            <h1
                style="font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; color: var(--text-main); background: linear-gradient(135deg, #1e293b 0%, #4f46e5 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                เข้าสู่ระบบ</h1>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 32px;">ยินดีต้อนรับสู่ Driver Room
                Center</p>

            <form action="index.html" method="GET" class="mockup-form">
                <div class="form-group" style="text-align: left;">
                    <label>รหัสพนักงาน</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-id-badge input-icon"></i>
                        <input type="text" class="form-control" placeholder="กรอกรหัสพนักงาน" required>
                    </div>
                </div>

                <div class="form-group" style="text-align: left;">
                    <label>รหัสผ่าน</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" class="form-control" placeholder="กรอกรหัสผ่าน" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit ripple-btn" style="width: 100%; margin-top: 24px;">
                    <span>เข้าสู่ระบบ</span>
                    <i class="fa-solid fa-right-to-bracket"></i>
                </button>
            </form>

            <p style="margin-top: 32px; font-size: 0.85rem; color: var(--text-muted);">
                มีปัญหาในการเข้าสู่ระบบ? <a href="#"
                    style="color: var(--primary); font-weight: 600; text-decoration: none;">ติดต่อผู้ดูแล</a>
            </p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
