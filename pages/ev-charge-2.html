<!-- EV Charge Page 2 -->
<div id="ev-charge-page-2">
    <!-- Header Hint Block -->
    <div
        style="background: white; border-radius: 12px; margin-bottom: 24px; overflow: hidden; border: 1px solid var(--border-light);">
        <div
            style="background: #e2e8f0; padding: 12px 16px; font-weight: 600; font-size: 1.05rem; color: var(--primary-dark);">
            เลือกสถานีชาร์จ
        </div>
        <div style="padding: 16px; font-size: 0.95rem; line-height: 1.6; color: var(--text-main);">
            กรุณาเลือกสถานีชาร์จ<br>
            เช่น โรงงาน1 โรงงาน3 และ โรงงานMEC
        </div>
    </div>

    <!-- 7. Choose Station -->
    <div class="form-group">
        <label>เลือกสถานีชาร์จ <span class="required">*</span></label>
        <div class="select-wrapper">
            <i class="fa-solid fa-charging-station input-icon"></i>
            <select class="form-control" required>
                <option value="" disabled selected>Choose</option>
                <option>โรงงาน1</option>
                <option>โรงงาน3</option>
                <option>โรงงาน MEC</option>
            </select>
            <i class="fa-solid fa-chevron-down select-arrow"></i>
        </div>
    </div>

    <div style="display: flex; gap: 12px; margin-top: 24px;">
        <button class="btn-submit ripple-btn"
            style="background: white; color: var(--text-main); border: 2px solid #e2e8f0; flex: 1;"
            onclick="openForm('บริการสถานีชาร์จไฟ', 'ev-charge')">
            <i class="fa-solid fa-arrow-left"></i>
            <span>ย้อนกลับ</span>
        </button>
        <button class="btn-submit ripple-btn" style="flex: 2;" onclick="submitForm()">
            <span>อัพเดตข้อมูลระบบ</span>
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>
