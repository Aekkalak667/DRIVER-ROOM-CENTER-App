<div class="form-group">
    <label>วันสิ้นอายุ "ป้ายภาษี"</label>

    <div style="margin: 12px 0; text-align: center;">
        <img src="images/ป้ายภาษี.png" alt="ตัวอย่างป้ายภาษี"
            style="width: 100%; max-width: 250px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 8px;">
        <p style="font-size: 0.8rem; color: var(--text-main); line-height: 1.5; padding: 0 10px;">
            ป้ายภาษีรถยนต์ คืออะไร? ป้ายภาษีรถยนต์<br>
            หรือ เครื่องหมายแสดงการเสียภาษีประจำปี<br>
            แสดงให้เห็นว่ารถคันนี้ได้จดทะเบียนตาม<br>
            กฎหมายอย่างถูกต้องกับกรมการขนส่งทาง<br>
            บก และชำระภาษีประจำปีเรียบร้อยแล้ว
        </p>
    </div>

    <div class="input-icon-wrapper">
        <input type="date" class="form-control" required style="padding-left: 16px;">
        <i class="fa-regular fa-calendar input-icon" style="left: auto; right: 16px;"></i>
    </div>
</div>

<button class="btn-submit ripple-btn" onclick="submitForm()">
    <span>อัพเดตข้อมูลระบบ</span>
    <i class="fa-solid fa-paper-plane"></i>
</button>
