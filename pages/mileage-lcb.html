<!-- 1. Vehicle Registration -->
<div class="form-group">
    <label>ทะเบียนรถ (ตัวอย่าง 1สส 999) <span class="required">*</span></label>
    <div class="input-icon-wrapper">
        <i class="fa-solid fa-car input-icon"></i>
        <input type="text" class="form-control" placeholder="กรอกทะเบียนรถ" required>
    </div>
</div>

<!-- 2. Mileage on the 25th -->
<div class="form-group">
    <label>เลขไมล์ ณ. วันที่ 25 <span class="required">*</span></label>
    <div class="input-icon-wrapper">
        <i class="fa-solid fa-gauge input-icon"></i>
        <input type="number" class="form-control" placeholder="กรอกเลขไมล์" required>
    </div>
</div>

<!-- 3. Driver Name -->
<div class="form-group">
    <label>ชื่อพนักงานขับรถ / ผู้รับผิดชอบ <span class="required">*</span></label>
    <div class="input-icon-wrapper">
        <i class="fa-solid fa-user input-icon"></i>
        <input type="text" class="form-control" placeholder="กรอกชื่อ-นามสกุล" required>
    </div>
</div>

<!-- 4. Company -->
<div class="form-group">
    <label>บริษัทต้นสังกัด <span class="required">*</span></label>
    <div class="glass-panel" style="padding: 16px; border-radius: 16px; margin-top: 4px;">
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <label style="display: flex; align-items: center; gap: 12px; font-weight: 400; cursor: pointer;">
                <div class="radio-cell" style="flex: 0 0 auto;">
                    <input type="radio" name="company_lcb" value="MMTH" required>
                </div>
                <span>MMTH</span>
            </label>
            <label style="display: flex; align-items: center; gap: 12px; font-weight: 400; cursor: pointer;">
                <div class="radio-cell" style="flex: 0 0 auto;">
                    <input type="radio" name="company_lcb" value="SMS">
                </div>
                <span>SMS</span>
            </label>
            <label style="display: flex; align-items: center; gap: 12px; font-weight: 400; cursor: pointer;">
                <div class="radio-cell" style="flex: 0 0 auto;">
                    <input type="radio" name="company_lcb" value="SO">
                </div>
                <span>SO</span>
            </label>
        </div>
    </div>
</div>

<!-- 5. Vehicle Type -->
<div class="form-group">
    <label>รถประจำตำแหน่ง หรือ สแปร์ <span class="required">*</span></label>
    <div class="glass-panel" style="padding: 16px; border-radius: 16px; margin-top: 4px;">
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <label style="display: flex; align-items: center; gap: 12px; font-weight: 400; cursor: pointer;">
                <div class="radio-cell" style="flex: 0 0 auto;">
                    <input type="radio" name="vehicle_type_lcb" value="รถประจำตำแหน่ง" required>
                </div>
                <span>รถประจำตำแหน่ง</span>
            </label>
            <label style="display: flex; align-items: center; gap: 12px; font-weight: 400; cursor: pointer;">
                <div class="radio-cell" style="flex: 0 0 auto;">
                    <input type="radio" name="vehicle_type_lcb" value="รถสแปร์">
                </div>
                <span>รถสแปร์</span>
            </label>
        </div>
    </div>
</div>

<!-- 6. Car Model -->
<div class="form-group">
    <label>รุ่น / Car model <span class="required">*</span></label>
    <div class="select-wrapper">
        <i class="fa-solid fa-layer-group input-icon"></i>
        <select class="form-control" required>
            <option value="" disabled selected>เลือกรุ่นรถ</option>
            <option>ATTRAGE</option>
            <option>LANCER EX</option>
            <option>MIRAGE</option>
            <option>PAJERO</option>
            <option>OUTLANDER</option>
            <option>TRITON</option>
            <option>XPANDER</option>
            <option>XForce HEV</option>
        </select>
        <i class="fa-solid fa-chevron-down select-arrow"></i>
    </div>
</div>

<!-- 7. Mileage Before -->
<div class="form-group">
    <label>เลขไมล์ ก่อนเดินทาง (เผื่อลืมถ่ายเลขไมล์ปลายเดือนที่แล้ว) <span class="required">*</span></label>
    <div class="input-icon-wrapper">
        <i class="fa-solid fa-gauge input-icon" style="color: var(--text-muted);"></i>
        <input type="number" class="form-control" placeholder="กรอกเลขไมล์ก่อนเดินทาง" required>
    </div>
</div>

<!-- 8. Receipt Photo -->
<div class="form-group">
    <label>รูปถ่ายบิลน้ำมัน ในวัน 1 วัน ถึง 25 ของเดือน <span class="required">*</span></label>
    <div class="glass-panel"
        style="padding: 24px; border-radius: 12px; margin-top: 4px; text-align: center; border: 2px dashed rgba(99, 102, 241, 0.2); background: rgba(255, 255, 255, 0.5);">
        <i class="fa-solid fa-cloud-arrow-up"
            style="font-size: 2.5rem; color: #6366f1; margin-bottom: 12px; display: block;"></i>
        <p style="font-size: 0.95rem; color: var(--text-main); margin-bottom: 4px; font-weight: 500;">
            แตะเพื่ออัปโหลดรูปภาพ</p>
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 16px;">รองรับไฟล์ JPG, PNG</p>
        <input type="file" accept="image/*" style="display: none;" id="receiptUploadLcb" required>
        <button type="button" class="btn-submit ripple-btn"
            style="background: #6366f1; border-radius: 8px; font-size: 0.9rem; padding: 10px 20px; width: auto; display: inline-flex; justify-content: flex-start; gap: 8px; margin: 0; transform: none;"
            onclick="document.getElementById('receiptUploadLcb').click()">
            <i class="fa-solid fa-camera"></i> เลือกรูปภาพ
        </button>
    </div>
</div>

<!-- 9. Vehicle Tax Expiration Date -->
<div class="form-group">
    <label>วันสิ้นอายุ "ป้ายภาษี"</label>

    <div style="margin: 12px 0; text-align: center;">
        <img src="images/ป้ายภาษี.jpg" alt="ตัวอย่างป้ายภาษี"
            style="width: 100%; max-width: 250px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 8px;">
    </div>

    <div class="input-icon-wrapper">
        <input type="date" class="form-control" required style="padding-left: 16px;">
        <i class="fa-regular fa-calendar input-icon" style="left: auto; right: 16px;"></i>
    </div>
</div>

<!-- 10. Act (พรบ.) Expiration Date -->
<div class="form-group">
    <label>วันสิ้นสุดคุ้มครอง "พรบ."</label>

    <div style="margin: 12px 0; text-align: center;">
        <img src="images/พรบ.jpg" alt="ตัวอย่าง พรบ."
            style="width: 100%; max-width: 250px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 8px;">
    </div>

    <div class="input-icon-wrapper">
        <input type="date" class="form-control" required style="padding-left: 16px;">
        <i class="fa-regular fa-calendar input-icon" style="left: auto; right: 16px;"></i>
    </div>
</div>

<button class="btn-submit ripple-btn" onclick="submitForm()">
    <span>อัพเดตข้อมูลระบบ</span>
    <i class="fa-solid fa-paper-plane"></i>
</button>
